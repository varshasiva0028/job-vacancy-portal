<h2>Job Application Form</h2>

<form #form="ngForm" (ngSubmit)="submitForm(form)">

  <input type="text" name="name" [(ngModel)]="applicant.name" required>
  <br><br>

  <input type="email" name="email" [(ngModel)]="applicant.email" required>
  <br><br>

  <input type="text" name="phone" [(ngModel)]="applicant.phone" required>
  <br><br>

  <input type="text" name="qualification" [(ngModel)]="applicant.qualification" required>
  <br><br>

  <label>Gender:</label><br>

<label>
  <input
    type="radio"
    name="gender"
    value="Male"
    [(ngModel)]="applicant.gender"
    required>
  Male
</label>

<label style="margin-left:20px;">
  <input
    type="radio"
    name="gender"
    value="Female"
    [(ngModel)]="applicant.gender">
  Female
</label>

<br><br>

  <label>Languages Known:</label><br>

<div class="dropdown-header">

  <button
    type="button"
    class="dropdown-btn"
    (click)="showLanguages = !showLanguages">

    Select Languages ▼

  </button>

<button
  *ngIf="showLanguages"
  type="button"
  class="done-btn"
  (click)="showLanguages = false">

  Done

</button>

</div>

<div
  *ngIf="showLanguages"
  class="dropdown-content">

  <div *ngFor="let group of languageGroups">

    <strong>{{ group.label }}</strong>

    <div *ngFor="let option of group.options">

      <label>

        <input
          type="checkbox"
          [checked]="selectedLanguageNames.includes(option)"
          (change)="toggleLanguage(option, $event)">

        {{ option }}

      </label>

    </div>

    <hr>

  </div>

</div>

  <div
    class="language-card-list"
    *ngIf="selectedLanguages.length > 0">

    <div
      class="language-card"
      *ngFor="let language of selectedLanguages">

      <div class="language-card-header">
        <h4>{{ language.name }}</h4>
        <button
          type="button"
          class="trash-btn"
          (click)="removeLanguage(language.name)"
          aria-label="Remove {{ language.name }}">
          <i class="fas fa-trash"></i>
        </button>
      </div>

      <div class="skill-options">
        <label>
          <input
            type="checkbox"
            [(ngModel)]="language.read"
            [ngModelOptions]="{standalone: true}"
            (change)="updateLanguageAllState(language)">
          Read
        </label>

        <label>
          <input
            type="checkbox"
            [(ngModel)]="language.write"
            [ngModelOptions]="{standalone: true}"
            (change)="updateLanguageAllState(language)">
          Write
        </label>

        <label>
          <input
            type="checkbox"
            [(ngModel)]="language.speak"
            [ngModelOptions]="{standalone: true}"
            (change)="updateLanguageAllState(language)">
          Speak
        </label>
     
        <label>
          <input
            type="checkbox"
            [(ngModel)]="language.all"
            [ngModelOptions]="{standalone: true}"
            (change)="toggleAll(language)">
          All
        </label>
      </div>

      <div class="progress-wrapper">
        <progress
          [value]="getProgress(language)"
          max="100">
        </progress>
        <span>{{ getProgress(language) }}%</span>
      </div>
    </div>
  </div>

<br><br>

  <input type="file" (change)="onResumeSelect($event)">
  <br><br>

  <input type="file" (change)="onMarksheetSelect($event)">
  <br><br>
  <label>Upload Photo:</label>
<input type="file" accept="image/*" (change)="onPhotoSelect($event)">
<br><br>

  <button type="submit" [disabled]="loading">
    Submit
  </button>

</form>

<div *ngIf="submitted">
  <h3>Application Submitted Successfully</h3>
  <button (click)="downloadForm()">Download</button>
</div>
