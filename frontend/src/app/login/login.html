<div class="app-layout-wrapper">
  <!-- Login/Register Screen -->
  <div *ngIf="!isLoggedIn" class="login-wrapper">
    <!-- Login Card -->
    <div *ngIf="!isRegisterMode" class="login-container">
      <div class="login-header">
        <div class="logo-icon">🔑</div>
        <h2>Job Vacancy Portal</h2>
        <p class="subtitle">Please log in to access the job application system</p>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="login()" class="login-form-element" autocomplete="off">
        <div class="form-group">
          <label for="loginUsername">Username / Email ID:</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="loginUsername" placeholder="Enter username or email"
              [(ngModel)]="loginInput.usernameOrEmail" name="usernameOrEmail" autocomplete="off" required
              class="login-input">
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password:</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Enter password" [(ngModel)]="loginInput.password"
              name="password" required class="login-input">
          </div>
        </div>

        <div *ngIf="loginError" class="login-error-msg">
          {{ loginError }}
        </div>

        <button type="submit" class="btn-primary btn-login">Sign In</button>
      </form>

      <div class="auth-toggle-link">
        Don't have an account? <a href="javascript:void(0)" (click)="isRegisterMode = true; loginError = ''">Register
          Now</a>
      </div>
    </div>

    <!--Register Card-->
    <div *ngIf="isRegisterMode" class="login-container">
      <div class="login-header">
        <div class="logo-icon">📝</div>
        <h2>Create Account</h2>
        <p class="subtitle">Register to apply for job vacancies</p>
      </div>

      <form #registerForm="ngForm" (ngSubmit)="register()" class="login-form-element">
        <div class="form-group">
          <label for="regUsername">Username / Email ID:</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="regUsername" placeholder="Create username or email"
              [(ngModel)]="registerInput.usernameOrEmail" name="usernameOrEmail" required class="login-input">
          </div>
        </div>

        <div class="form-group">
          <label for="regPassword">Password:</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="regPassword" placeholder="Create password" [(ngModel)]="registerInput.password"
              name="password" required class="login-input">
          </div>
        </div>

        <div class="form-group">
          <label for="regConfirmPassword">Confirm Password:</label>
          <div class="input-wrapper">
            <span class="input-icon">🛡️</span>
            <input type="password" id="regConfirmPassword" placeholder="Re-enter password"
              [(ngModel)]="registerInput.confirmPassword" name="confirmPassword" required class="login-input">
          </div>
        </div>

        <button type="submit" class="btn-primary btn-login">Sign Up</button>
      </form>

      <div class="auth-toggle-link">
        Already have an account? <a href="javascript:void(0)" (click)="isRegisterMode = false">Log In</a>
      </div>
    </div>
  </div>
