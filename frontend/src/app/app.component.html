<div class="app-layout-wrapper">
  <!-- View Toggle Header (Centered) -->
  <div class="toggle-container">
    <button
      type="button"
      [class.active]="!showDashboard"
      (click)="showDashboard = false"
      class="toggle-btn"
    >
      Apply Now
    </button>
    <button
      type="button"
      [class.active]="showDashboard"
      (click)="showDashboard = true"
      class="toggle-btn"
    >
      Dashboard
    </button>
  </div>

  <!-- Apply Now Section (Centered Card) -->
  <div *ngIf="!showDashboard" class="form-container">
    <h2>Job Application Form</h2>

    <form #form="ngForm" (ngSubmit)="submitForm()" *ngIf="!submitted" class="basic-form">
      <div class="form-group">
        <label for="name">Full Name:</label>
        <input
          type="text"
          id="name"
          placeholder="Enter your name"
          [(ngModel)]="applicant.name"
          name="name"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Email Address:</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          [(ngModel)]="applicant.email"
          name="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input
          type="text"
          id="phone"
          placeholder="Enter 10-digit phone number"
          [(ngModel)]="applicant.phone"
          name="phone"
          maxlength="10"
          required
        >
      </div>

      <div class="form-group">
        <label for="qualification">Qualification:</label>
        <input
          type="text"
          id="qualification"
          placeholder="Enter your qualification"
          [(ngModel)]="applicant.qualification"
          name="qualification"
          required
        >
      </div>

      <div class="form-group">
        <label>Upload Resume:</label>
        <input
          type="file"
          (change)="onResumeSelect($event)"
          required
          class="file-input"
        >
      </div>

      <div class="form-group">
        <label>Upload Marksheet:</label>
        <input
          type="file"
          (change)="onMarksheetSelect($event)"
          required
          class="file-input"
        >
      </div>

      <button type="submit" class="btn-primary">Submit Application</button>
    </form>

    <!-- Success State -->
    <div *ngIf="submitted" class="success-box">
      <h3>Application Submitted Successfully!</h3>
      <p>Your details have been saved in our registry.</p>
      <div class="actions">
        <button (click)="downloadForm()" class="btn-secondary">Download Details</button>
        <button (click)="submitted = false" class="btn-primary">New Application</button>
        <button (click)="showDashboard = true; submitted = false" class="btn-primary">Open Dashboard</button>
      </div>
    </div>
  </div>

  <!-- Dashboard Section (Full Width Layout) -->
  <div *ngIf="showDashboard" class="dashboard-full-width">
    <h2>Applicants Dashboard</h2>
    <app-dashboard></app-dashboard>
  </div>
</div>
